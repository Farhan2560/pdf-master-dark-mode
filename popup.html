<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Total Eclipse</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <div id="fileWarning" class="file-warning-box" style="display: none;">
      <h4><strong>⚠️ PDF Access Required</strong></h4>
      <p>Please enable <b>'Allow access to file URLs'</b> in the extension settings and refresh the page to use filters on local files.</p>
      <button id="openSettingsBtn">Go to settings</button>
    </div>
    <header class="popup-header">
      <h1>Total Eclipse🌜</h1>
    </header>

   
    <div class="controls">

      <!-- Dark Mode Toggle -->
      <div class="control-row toggle-row">
        <span class="control-label">Dark Mode</span>
        <label class="mech-checkbox-label">
          <input type="checkbox" id="darkModeToggle" class="mech-checkbox" />
          <span class="mech-btn"></span>
        </label>
      </div>

      <!-- Brightness Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Brightness</span>
          <span class="control-value" id="brightnessValue">100%</span>
        </div>
        <div class="slider-container">
          <button class="icon-btn minus-btn" data-target="brightnessSlider">−</button>
          <input
            type="range"
            id="brightnessSlider"
            class="slider"
            min="50"
            max="150"
            value="100"
          />
          <button class="icon-btn plus-btn" data-target="brightnessSlider">+</button>
        </div>
      </div>

      <!-- Contrast Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Contrast</span>
          <span class="control-value" id="contrastValue">100%</span>
        </div>
        <div class="slider-container">
          <button class="icon-btn minus-btn" data-target="contrastSlider">−</button>
          <input
            type="range"
            id="contrastSlider"
            class="slider"
            min="50"
            max="150"
            value="100"
          />
          <button class="icon-btn plus-btn" data-target="contrastSlider">+</button>
        </div>
      </div>

      <!-- Grayscale Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Grayscale</span>
          <span class="control-value" id="grayscaleValue">0%</span>
        </div>
        <div class="slider-container">
          <button class="icon-btn minus-btn" data-target="grayscaleSlider">−</button>
          <input
            type="range"
            id="grayscaleSlider"
            class="slider"
            min="0"
            max="100"
            value="0"
          />
          <button class="icon-btn plus-btn" data-target="grayscaleSlider">+</button>
        </div>
      </div>

      <!-- Blue Light Filter Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Blue Light Filter</span>
          <span class="control-value" id="blueLightValue">0%</span>
        </div>
        <div class="slider-container">
          <button class="icon-btn minus-btn" data-target="blueLightSlider">−</button>
          <input
            type="range"
            id="blueLightSlider"
            class="slider"
            min="0"
            max="50"
            value="0"
          />
          <button class="icon-btn plus-btn" data-target="blueLightSlider">+</button>
        </div>
      </div>

      <div class="control-row">

        <button id="resetButton" class="reset-btn">Restore Default</button>

      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
