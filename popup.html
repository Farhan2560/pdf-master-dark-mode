<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Total Eclipse</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>Total Eclipse</h1>
    </header>

    <div class="controls">

      <!-- Dark Mode Toggle -->
      <div class="control-row toggle-row">
        <span class="control-label">Dark Mode</span>
        <label class="toggle-switch">
          <input type="checkbox" id="darkModeToggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- <div class="control-row toggle-row">
        <span class="control-label">Always Auto-Enable</span>
        <label class="toggle-switch">
          <input type="checkbox" id="autoEnableToggle" />
          <span class="toggle-slider"></span>
        </label>
      </div> -->

      <!-- Brightness Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Brightness</span>
          <span class="control-value" id="brightnessValue">100%</span>
        </div>
        <input
          type="range"
          id="brightnessSlider"
          class="slider"
          min="50"
          max="150"
          value="100"
        />
      </div>

      <!-- Contrast Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Contrast</span>
          <span class="control-value" id="contrastValue">100%</span>
        </div>
        <input
          type="range"
          id="contrastSlider"
          class="slider"
          min="50"
          max="150"
          value="100"
        />
      </div>

      <!-- Grayscale Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Grayscale</span>
          <span class="control-value" id="grayscaleValue">0%</span>
        </div>
        <input
          type="range"
          id="grayscaleSlider"
          class="slider"
          min="0"
          max="100"
          value="0"
        />
      </div>

      <!-- Blue Light Filter Slider -->
      <div class="control-row">
        <div class="control-header">
          <span class="control-label">Blue Light Filter</span>
          <span class="control-value" id="blueLightValue">0%</span>
        </div>
        <input
          type="range"
          id="blueLightSlider"
          class="slider"
          min="0"
          max="50"
          value="0"
        />
      </div>

      <div class="control-row">

        <button id="resetButton" class="reset-btn">Restore Default</button>

      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
